version: '3.8'

services:
  api:
    image: ${DOCKER_USERNAME:-pranjal1712}/energymind-api:latest
    build: .
    container_name: energymind-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PORT=8000

  frontend:
    image: ${DOCKER_USERNAME:-pranjal1712}/energymind-frontend:latest
    build: ./frontend
    container_name: energymind-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
