services:
  - type: web
    name: energymind-api
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    region: singapore # Change to your preferred region
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false # Set this in Render Dashboard from Supabase
      - key: GOOGLE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
