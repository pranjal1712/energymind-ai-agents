apiVersion: v1
kind: Service
metadata:
  name: energymind-svc
spec:
  type: NodePort
  selector:
    app: energymind
  ports:
  - name: streamlit
    protocol: TCP
    port: 8501
    targetPort: 7860
    nodePort: 30001
  - name: fastapi
    protocol: TCP
    port: 8000
    targetPort: 8000
    nodePort: 30000
