name: CI/CD - Build, Push & Deploy to K3s

on:
  push:
    branches: [ "main" ]

jobs:
  # ============================================
  # JOB 1: Build Docker Image & Push to DockerHub
  # ============================================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/energymind-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/energymind-app:${{ github.sha }}

  # ============================================
  # JOB 2: Deploy to K3s on EC2
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push   # Ye tab chalega jab Job 1 complete ho
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create K8s Secrets File on EC2 & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Create/Update the Kubernetes Secret with API Keys
            kubectl create secret generic energymind-secrets \
              --from-literal=GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              --from-literal=TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
              --dry-run=client -o yaml | kubectl apply -f -

            # 2. Apply the latest K8s manifests
            cd /home/ubuntu/energymind-ai-agents
            git pull origin main
            kubectl apply -f k8s/deployment.yaml
            kubectl apply -f k8s/service.yaml

            # 3. Force a rolling restart to pull the new :latest image
            kubectl rollout restart deployment/energymind-deployment

            # 4. Wait for rollout to complete
            kubectl rollout status deployment/energymind-deployment --timeout=120s
