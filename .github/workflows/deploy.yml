name: Deploy to AWS EC2

on:
  push:
    branches:
      - feature/react-frontend
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/energymind-api:latest

  deploy-instance-1:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Instance 1 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/energymind
            # Pull the latest image
            docker-compose pull
            # Restart the services
            docker-compose up -d
            # Clean up old images
            docker image prune -f

  deploy-instance-2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Instance 2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_2 }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY_2 }}
          script: |
            cd ~/energymind
            # Pull the latest image
            docker-compose pull
            # Restart the services
            docker-compose up -d
            # Clean up old images
            docker image prune -f
